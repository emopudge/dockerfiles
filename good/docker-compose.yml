version: '3.8'

services:
  frontend:
    image: nginx:alpine
    networks:
      - public
      
  backend:
    image: node:18
    networks:
      - public
      - private
      
  database:
    image: postgres:15
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  public:
    driver: bridge
  private:
    driver: bridge
    internal: true

volumes:
  db-data:
    name: myapp-database-data
